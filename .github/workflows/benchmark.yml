name: Driver Benchmark

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  benchmark:
    name: "turbopg vs asyncpg / psycopg3"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Reset Docker benchmark state
        run: |
          docker compose -f benchmarks/pgbench/docker-compose.yml down -v --remove-orphans || true

      - name: Run benchmark
        run: |
          docker compose -f benchmarks/pgbench/docker-compose.yml up --build --abort-on-container-exit pgbench | tee pgbench_output.txt

      - name: Tear down Docker benchmark state
        if: always()
        run: |
          docker compose -f benchmarks/pgbench/docker-compose.yml down -v --remove-orphans || true

      - name: Upload benchmark output
        uses: actions/upload-artifact@v4
        with:
          name: driver-benchmark-output
          path: pgbench_output.txt
